version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "TuPasswordSegura123"
      ACCEPT_EULA: "Y"
    restart: always
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data:
