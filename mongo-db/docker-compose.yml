services:
  mongodb:
    image: mongo:latest
    container_name: mongo-server
    restart: on-failure # reiniciar el contenedor si falla pero no cuando se detiene manualmente o se reinicia el servicio de docker
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rdev
      MONGO_INITDB_ROOT_PASSWORD: rdev
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
